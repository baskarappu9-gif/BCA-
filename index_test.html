<!doctype html>
<html lang="en">

<head>
  <script type="module">import { injectIntoGlobalHook } from "/@react-refresh";
injectIntoGlobalHook(window);
window.$RefreshReg$ = () => {};
window.$RefreshSig$ = () => (type) => type;</script>

  <script type="module" src="/@vite/client"></script>

  <meta charset="UTF-8" />

  <script>
    console.log("Error handler initialized");
    window.onerror = function (msg, url, lineNo, columnNo, error) {
      const div = document.createElement('div');
      div.style.cssText = 'color: red; padding: 20px; background: white; position: fixed; inset: 0; z-index: 9999; overflow: auto; text-align: left; font-family: sans-serif;';
      div.innerHTML = '<h1 style="margin: 0 0 10px 0;">Runtime Error</h1><p><b>' + msg + '</b></p><p>URL: ' + url + '</p><p>Line: ' + lineNo + ':' + columnNo + '</p><pre style="background: #fdf2f2; padding: 10px; border-radius: 4px; border: 1px solid #fee2e2;">' + (error ? error.stack : "No stack trace") + '</pre>';
      document.body.appendChild(div);
      return false;
    };
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
